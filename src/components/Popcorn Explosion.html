<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Popcorn Explosion</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: Inter, system-ui, sans-serif; }
  #app { position: fixed; inset: 0; }
</style>
</head>
<body>
<div id="app" data-anim-root data-screen-label="t=00s"></div>

<template id="__bundler_thumbnail" data-bg-color="#1a0c08">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- warm radial bg -->
    <defs>
      <radialGradient id="bgg" cx="50%" cy="78%" r="65%">
        <stop offset="0%" stop-color="#6a230d"/>
        <stop offset="50%" stop-color="#3a160a"/>
        <stop offset="100%" stop-color="#1a0c08"/>
      </radialGradient>
    </defs>
    <rect width="1200" height="800" fill="url(#bgg)"/>
    <!-- popcorn cluster -->
    <g transform="translate(600,360)">
      <g fill="#f0d28a" opacity="0.85" transform="translate(6,10)">
        <circle cx="-90" cy="-30" r="78"/>
        <circle cx="80" cy="-20" r="72"/>
        <circle cx="-40" cy="60" r="68"/>
        <circle cx="60" cy="70" r="62"/>
        <circle cx="0" cy="-90" r="58"/>
        <circle cx="0" cy="0" r="80"/>
      </g>
      <g fill="#fff3cf">
        <circle cx="-90" cy="-30" r="78"/>
        <circle cx="80" cy="-20" r="72"/>
        <circle cx="-40" cy="60" r="68"/>
        <circle cx="60" cy="70" r="62"/>
        <circle cx="0" cy="-90" r="58"/>
        <circle cx="0" cy="0" r="80"/>
      </g>
      <g fill="#fffdf3" opacity="0.75">
        <circle cx="-110" cy="-50" r="42"/>
        <circle cx="60" cy="-40" r="38"/>
        <circle cx="-60" cy="40" r="36"/>
        <circle cx="40" cy="50" r="34"/>
        <circle cx="-20" cy="-110" r="32"/>
        <circle cx="-20" cy="-20" r="44"/>
      </g>
    </g>
    <!-- pan suggestion -->
    <ellipse cx="600" cy="640" rx="320" ry="32" fill="#0d0604"/>
    <ellipse cx="600" cy="630" rx="296" ry="22" fill="#5a3416"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="popcorn-scene.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('app'));
  root.render(<PopcornAnimation />);
</script>
</body>
</html>
